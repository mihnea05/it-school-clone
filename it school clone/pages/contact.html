<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <!-- css -->
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/contact.css" />
  </head>

  <body>
    <!-- NAV (identic ca la celelalte pagini) -->
    <nav>
      <div class="container">
        <a href="../index.html" class="logo-link">
          <img src="../img/itschool-logo.png" alt="logo" />
        </a>

        <ul>
          <li><a href="courses.html">Cursuri online</a></li>
          <li><a href="about.html">Despre noi</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- HERO -->
    <section class="contact-hero">
      <div class="container">
        <h1>Contactează-ne</h1>
        <p>Suntem aici pentru tine. Scrie-ne și îți răspundem rapid.</p>
      </div>
    </section>

    <!-- CONTACT CONTENT -->
    <section class="contact-section">
      <div class="container contact-container">
        <!-- LEFT: info -->
        <div class="contact-info">
          <h2>Detalii de contact</h2>
          <p><strong>Email:</strong> contact@itschool.ro</p>
          <p><strong>Telefon:</strong> 0770 123 456</p>
          <p><strong>Adresă:</strong> Timișoara, România</p>
        </div>

        <!-- RIGHT: formular -->
        <div class="contact-form">
          <h2>Trimite-ne un mesaj</h2>

          <form>
            <input type="text" placeholder="Nume" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Mesajul tău..." rows="5"></textarea>
            <button type="submit">Trimite</button>
          </form>
        </div>
      </div>
      <div class="contact-map">
        <iframe
          src="https://maps.google.com/maps?q=timisoara&t=&z=13&ie=UTF8&iwloc=&output=embed"
          width="100%"
          height="100%"
          frameborder="0"
        >
        </iframe>
      </div>
    </section>
  </body>
</html>
